<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buildfarmer Dashboard</title>
<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; line-height: 1.5; }

/* ── Tokens ─────────────────────────────────────────────────────────────── */
:root {
  --bg-page:    #0f1117;
  --bg-surface: #1a1d27;
  --bg-hover:   #1f2336;
  --border:     #2a2d3e;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --green:      #22c55e;
  --red:        #ef4444;
  --amber:      #f59e0b;
  --blue:       #3b82f6;
  --purple:     #8b5cf6;
  --orange:     #f97316;
  --gray:       #475569;
}

/* ── Page ───────────────────────────────────────────────────────────────── */
body        { background: var(--bg-page); color: var(--text); }
a           { color: var(--blue); text-decoration: none; }
a:hover     { text-decoration: underline; }

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
header h1   { font-size: 15px; font-weight: 600; letter-spacing: .04em; }
.dot        { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.updated    { margin-left: auto; color: var(--muted); font-size: 11px; }

/* ── Tabs ───────────────────────────────────────────────────────────────── */
nav {
  display: flex; gap: 2px;
  padding: 10px 20px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
.tab {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font: inherit; font-size: 12px; font-weight: 500;
  padding: 6px 14px 8px; letter-spacing: .05em;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab:hover  { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--blue); }

/* ── Toolbar ────────────────────────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
.toolbar input, .toolbar select {
  background: var(--bg-page); border: 1px solid var(--border);
  color: var(--text); font: inherit; font-size: 12px;
  padding: 5px 10px; border-radius: 4px;
}
.toolbar input         { min-width: 260px; }
.toolbar input::placeholder { color: var(--muted); }
.toolbar select        { cursor: pointer; }
.counts                { margin-left: auto; color: var(--muted); font-size: 11px; }

/* ── Section headings ───────────────────────────────────────────────────── */
.section-head {
  display: flex; align-items: baseline; gap: 8px;
  padding: 18px 20px 8px;
}
.section-head h2 { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--muted); }
.badge-count {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--border); color: var(--text);
  font-size: 10px; font-weight: 600;
  min-width: 20px; height: 18px; padding: 0 5px; border-radius: 9px;
}
.window-note { font-size: 11px; color: var(--muted); margin-left: 4px; }

/* ── Tables ─────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; padding: 0 20px 20px; }
table       { width: 100%; border-collapse: collapse; }
th {
  text-align: left; font-size: 10px; font-weight: 600;
  letter-spacing: .07em; color: var(--muted);
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td          { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg-hover); }

.test-name  { font-size: 12px; max-width: 320px; overflow-wrap: anywhere; }
.pkg        { color: var(--muted); }

/* ── Platform badges ────────────────────────────────────────────────────── */
.platforms  { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.os-linux   { background: #1d3461; color: #93c5fd; }
.os-windows { background: #2e1065; color: #c4b5fd; }
.os-macos   { background: #431407; color: #fdba74; }
.os-unknown { background: var(--border); color: var(--muted); }

/* ── Age ────────────────────────────────────────────────────────────────── */
.age        { white-space: nowrap; }
.age.old    { color: var(--red); font-weight: 600; }

/* ── Fail rate ──────────────────────────────────────────────────────────── */
.fail-rate  { color: var(--amber); font-weight: 600; }

/* ── Issue link ─────────────────────────────────────────────────────────── */
.no-issue   { color: var(--muted); }

/* ── History chart ──────────────────────────────────────────────────────── */
.history-chart { display: block; }

/* ── Suspect commits ────────────────────────────────────────────────────── */
.suspect-btn {
  background: var(--border); border: none; border-radius: 4px;
  color: var(--text); cursor: pointer; font: inherit; font-size: 11px;
  padding: 3px 8px; white-space: nowrap;
}
.suspect-btn:hover { background: var(--bg-hover); border-color: var(--blue); }
.no-suspects { color: var(--muted); }

/* ── Stale ──────────────────────────────────────────────────────────────── */
.stale-yes  { color: var(--amber); }

/* ── Empty state ────────────────────────────────────────────────────────── */
.empty-cell { text-align: center; color: var(--muted); padding: 24px; }

/* ── Modal ──────────────────────────────────────────────────────────────── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
#modal-overlay[hidden] { display: none; }
#modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 680px; width: 100%;
  max-height: 80vh;
  display: flex; flex-direction: column;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 13px; font-weight: 600; }
#modal-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px;
}
#modal-close:hover { color: var(--text); }
#modal-body { overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.commit-entry { border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.commit-repo  { font-weight: 600; font-size: 12px; margin-bottom: 6px; }
.commit-shas  { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
.commit-link  { font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>BUILDFARMER DASHBOARD</h1>
  <span class="updated" id="updated-at"></span>
</header>

<nav>
  <button class="tab active" data-tab="regressions">REGRESSIONS</button>
  <button class="tab"        data-tab="known-issues">KNOWN ISSUES</button>
</nav>

<!-- ── Regressions panel ──────────────────────────────────────────────── -->
<section id="panel-regressions">
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search test name or package…">
    <select id="filter-project">
      <option value="">All projects</option>
      <option value="ROS">ROS</option>
      <option value="Gazebo">Gazebo</option>
    </select>
    <select id="filter-os">
      <option value="">All platforms</option>
    </select>
    <select id="filter-type">
      <option value="">Consistent + Flaky</option>
      <option value="consistent">Consistent only</option>
      <option value="flaky">Flaky only</option>
    </select>
    <span class="counts" id="reg-counts"></span>
  </div>

  <div id="consistent-group">
    <div class="section-head">
      <h2>CONSISTENT FAILURES</h2>
      <span class="badge-count" id="consistent-count">0</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>TEST NAME</th>
            <th>PACKAGE</th>
            <th>PLATFORMS</th>
            <th>AGE</th>
            <th>KNOWN ISSUE</th>
            <th>90D HISTORY</th>
            <th>SUSPECT COMMITS</th>
          </tr>
        </thead>
        <tbody id="consistent-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="flaky-group">
    <div class="section-head">
      <h2>FLAKY TESTS</h2>
      <span class="badge-count" id="flaky-count">0</span>
      <span class="window-note" id="flaky-window"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>TEST NAME</th>
            <th>PACKAGE</th>
            <th>PLATFORMS</th>
            <th>FAIL RATE</th>
            <th>KNOWN ISSUE</th>
            <th>90D HISTORY</th>
            <th>SUSPECT COMMITS</th>
          </tr>
        </thead>
        <tbody id="flaky-tbody"></tbody>
      </table>
    </div>
  </div>
</section>

<!-- ── Known Issues panel ─────────────────────────────────────────────── -->
<section id="panel-known-issues" hidden>
  <div class="table-wrap" style="padding-top:16px">
    <table>
      <thead>
        <tr>
          <th>ISSUE</th>
          <th>STATUS</th>
          <th>PRIORITY</th>
          <th>ASSIGNEE</th>
          <th>LAST ACTIVITY</th>
          <th>LAST SEEN IN BUILD</th>
        </tr>
      </thead>
      <tbody id="known-issues-tbody"></tbody>
    </table>
  </div>
</section>

<!-- ── Suspect commits modal ──────────────────────────────────────────── -->
<div id="modal-overlay" hidden>
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Suspect commits</h3>
      <button id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="dashboard_data.js"></script>
<script>
(function () {
  'use strict';

  // ── Helpers ──────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function isGazebo(row) {
    var n = (row.test_name + ' ' + row.package).toLowerCase();
    return n.indexOf('gz') !== -1 || n.indexOf('gazebo') !== -1 || n.indexOf('sdformat') !== -1;
  }

  function formatIssueLabel(url) {
    if (!url) return null;
    var m = url.match(/github\.com\/([^/]+\/[^/]+)\/(issues|pull)\/(\d+)/);
    return m ? m[1] + '#' + m[3] : url;
  }

  function ageDays(firstSeenDate, refDate) {
    var d0 = new Date(firstSeenDate);
    var d1 = new Date(refDate);
    return Math.max(0, Math.round((d1 - d0) / 86400000));
  }

  function platformBadgesHtml(platforms) {
    if (!platforms || !platforms.length) return '<span class="no-issue">—</span>';
    var seen = {};
    return platforms.map(function (p) {
      var os = (p.os || 'unknown').toLowerCase();
      var cls = os.indexOf('linux') !== -1  ? 'os-linux'
              : os.indexOf('win')   !== -1  ? 'os-windows'
              : os.indexOf('mac')   !== -1 || os.indexOf('brew') !== -1 ? 'os-macos'
              :                               'os-unknown';
      var label = os + '/' + (p.arch || '?');
      if (seen[label]) return '';
      seen[label] = true;
      return '<span class="badge ' + cls + '">' + esc(label) + '</span>';
    }).join('');
  }

  // ── History bar chart ────────────────────────────────────────────────────

  function historyBarsHtml(testName) {
    var history = (typeof DASHBOARD_DATA !== 'undefined' && DASHBOARD_DATA.test_history)
                  ? DASHBOARD_DATA.test_history[testName] : null;
    if (!history || !history.length) {
      return '<span class="no-issue">no data</span>';
    }

    var BAR_W = 4, GAP = 1, BAR_H = 32, LABEL_H = 14;
    var W = history.length * (BAR_W + GAP) - GAP;
    var H = BAR_H + LABEL_H;

    var bars = '';
    var labels = '';
    var prevMonth = null;

    history.forEach(function (pt, i) {
      var x    = i * (BAR_W + GAP);
      var fill = pt.result === 1 ? '#22c55e'
               : pt.result === 0 ? '#ef4444'
               :                   '#2a2d3e';
      var tip  = pt.date + ': ' + (pt.result === 1 ? 'pass' : pt.result === 0 ? 'fail' : 'no run');
      bars += '<rect x="' + x + '" y="0" width="' + BAR_W + '" height="' + BAR_H + '" fill="' + fill + '" rx="1"><title>' + esc(tip) + '</title></rect>';

      var month = pt.date ? pt.date.slice(0, 7) : null;
      if (month && month !== prevMonth) {
        labels += '<text x="' + x + '" y="' + (BAR_H + LABEL_H - 2) + '" font-size="9" fill="#64748b">' + esc(month) + '</text>';
        prevMonth = month;
      }
    });

    return '<svg class="history-chart" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
         + bars + labels + '</svg>';
  }

  // ── Suspect commits ──────────────────────────────────────────────────────

  function suspectBtnHtml(commits, testName) {
    if (!commits || !commits.length) {
      return '<span class="no-suspects">—</span>';
    }
    return '<button class="suspect-btn" data-test="' + esc(testName) + '">'
         + '&#x26AD; ' + commits.length + ' repo' + (commits.length !== 1 ? 's' : '')
         + '</button>';
  }

  function openModal(testName, commits) {
    document.getElementById('modal-title').textContent = 'Suspect commits — ' + testName;
    var body = document.getElementById('modal-body');
    if (!commits || !commits.length) {
      body.innerHTML = '<p style="color:var(--muted)">No suspect commits found.</p>';
    } else {
      body.innerHTML = commits.map(function (c) {
        return '<div class="commit-entry">'
             + '<div class="commit-repo">' + esc(c.repo) + '</div>'
             + '<div class="commit-shas">' + esc(c.last_success_sha) + ' &rarr; ' + esc(c.first_failure_sha) + '</div>'
             + '<div class="commit-link"><a href="' + esc(c.compare_url) + '" target="_blank" rel="noopener">Compare on GitHub &rarr;</a></div>'
             + '</div>';
      }).join('');
    }
    document.getElementById('modal-overlay').removeAttribute('hidden');
  }

  function closeModal() {
    document.getElementById('modal-overlay').setAttribute('hidden', '');
  }

  // ── Filtering ────────────────────────────────────────────────────────────

  function rowMatchesFilters(row, q, project, os) {
    if (q) {
      var haystack = (row.test_name + ' ' + row.package).toLowerCase();
      if (haystack.indexOf(q) === -1) return false;
    }
    if (project) {
      var g = isGazebo(row);
      if (project === 'ROS' && g) return false;
      if (project === 'Gazebo' && !g) return false;
    }
    if (os) {
      var plats = row.affected_platforms || [];
      var found = plats.some(function (p) { return (p.os || '').toLowerCase() === os; });
      if (!found) return false;
    }
    return true;
  }

  // ── Render helpers ───────────────────────────────────────────────────────

  function issueHtml(url) {
    var label = formatIssueLabel(url);
    return label ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(label) + '</a>'
                 : '<span class="no-issue">—</span>';
  }

  function renderConsistent(rows, q, project, os, generatedAt) {
    var filtered = rows.filter(function (r) { return rowMatchesFilters(r, q, project, os); });
    document.getElementById('consistent-count').textContent = filtered.length;

    if (!filtered.length) {
      return '<tr><td colspan="7" class="empty-cell">No matching results</td></tr>';
    }
    return filtered.map(function (r) {
      var days = ageDays(r.first_seen_date, generatedAt);
      var ageClass = days > 7 ? ' old' : '';
      return '<tr>'
           + '<td class="test-name">' + esc(r.test_name) + '</td>'
           + '<td class="pkg">' + esc(r.package) + '</td>'
           + '<td><div class="platforms">' + platformBadgesHtml(r.affected_platforms) + '</div></td>'
           + '<td class="age' + ageClass + '">' + days + 'd</td>'
           + '<td>' + issueHtml(r.linked_issue) + '</td>'
           + '<td>' + historyBarsHtml(r.test_name) + '</td>'
           + '<td>' + suspectBtnHtml(r.suspect_commits, r.test_name) + '</td>'
           + '</tr>';
    }).join('');
  }

  function renderFlaky(rows, q, project, os) {
    var filtered = rows.filter(function (r) { return rowMatchesFilters(r, q, project, os); });
    document.getElementById('flaky-count').textContent = filtered.length;

    if (!filtered.length) {
      return '<tr><td colspan="7" class="empty-cell">No matching results</td></tr>';
    }
    return filtered.map(function (r) {
      return '<tr>'
           + '<td class="test-name">' + esc(r.test_name) + '</td>'
           + '<td class="pkg">' + esc(r.package) + '</td>'
           + '<td><div class="platforms">' + platformBadgesHtml(r.affected_platforms) + '</div></td>'
           + '<td class="fail-rate">' + r.fail_rate_pct + '%<span style="color:var(--muted);font-weight:normal"> (' + r.failure_count + '/' + r.total_runs + ')</span></td>'
           + '<td>' + issueHtml(r.linked_issue) + '</td>'
           + '<td>' + historyBarsHtml(r.test_name) + '</td>'
           + '<td><span class="no-suspects">—</span></td>'
           + '</tr>';
    }).join('');
  }

  function renderKnownIssues(rows) {
    if (!rows.length) {
      return '<tr><td colspan="6" class="empty-cell">No known issues</td></tr>';
    }
    return rows.map(function (r) {
      var label = formatIssueLabel(r.issue_id) || r.issue_id;
      var staleHtml = r.stale ? '<span class="stale-yes">stale</span>' : '';
      return '<tr>'
           + '<td><a href="' + esc(r.issue_id) + '" target="_blank" rel="noopener">' + esc(label) + '</a></td>'
           + '<td>' + esc(r.status) + '</td>'
           + '<td>' + (r.priority != null ? r.priority.toFixed(3) : '—') + '</td>'
           + '<td>' + (r.assignee ? esc(r.assignee) : '<span class="no-issue">—</span>') + '</td>'
           + '<td>' + esc(r.last_activity_date || '—') + '</td>'
           + '<td>' + esc(r.last_seen_in_build_date || '—') + ' ' + staleHtml + '</td>'
           + '</tr>';
    }).join('');
  }

  // ── Boot ─────────────────────────────────────────────────────────────────

  function boot(data) {
    // Header timestamp
    var d = new Date(data.generated_at);
    document.getElementById('updated-at').textContent =
      'Updated ' + d.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';

    // Populate OS filter from all platforms in both tables
    var osSet = {};
    (data.regressions.consistent || []).concat(data.regressions.flaky || []).forEach(function (r) {
      (r.affected_platforms || []).forEach(function (p) { if (p.os) osSet[p.os] = true; });
    });
    var osSelect = document.getElementById('filter-os');
    Object.keys(osSet).sort().forEach(function (os) {
      var opt = document.createElement('option');
      opt.value = os; opt.textContent = os;
      osSelect.appendChild(opt);
    });

    // Flaky window note
    document.getElementById('flaky-window').textContent = '(20-day window)';

    // Build suspect commits index: test_name -> commits
    var suspectIndex = {};
    (data.regressions.consistent || []).forEach(function (r) {
      if (r.suspect_commits) suspectIndex[r.test_name] = r.suspect_commits;
    });

    function rerender() {
      var q       = document.getElementById('search').value.toLowerCase().trim();
      var project = document.getElementById('filter-project').value;
      var os      = document.getElementById('filter-os').value;
      var type    = document.getElementById('filter-type').value;

      var showConsistent = type !== 'flaky';
      var showFlaky      = type !== 'consistent';

      document.getElementById('consistent-group').style.display = showConsistent ? '' : 'none';
      document.getElementById('flaky-group').style.display      = showFlaky      ? '' : 'none';

      if (showConsistent) {
        document.getElementById('consistent-tbody').innerHTML =
          renderConsistent(data.regressions.consistent || [], q, project, os, data.generated_at);
      }
      if (showFlaky) {
        document.getElementById('flaky-tbody').innerHTML =
          renderFlaky(data.regressions.flaky || [], q, project, os);
      }

      // Update count summary
      var cCount = parseInt(document.getElementById('consistent-count').textContent, 10) || 0;
      var fCount = parseInt(document.getElementById('flaky-count').textContent, 10) || 0;
      document.getElementById('reg-counts').textContent =
        (showConsistent && showFlaky) ? cCount + ' consistent, ' + fCount + ' flaky'
        : showConsistent ? cCount + ' results'
        : fCount + ' results';
    }

    // Known issues (static — no filters on this panel)
    document.getElementById('known-issues-tbody').innerHTML =
      renderKnownIssues(data.known_issues || []);

    // Tab switching
    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('panel-regressions').hidden  = btn.dataset.tab !== 'regressions';
        document.getElementById('panel-known-issues').hidden = btn.dataset.tab !== 'known-issues';
      });
    });

    // Filter controls
    ['search', 'filter-project', 'filter-os', 'filter-type'].forEach(function (id) {
      document.getElementById(id).addEventListener('input', rerender);
    });

    // Click delegation: suspect commit buttons + modal close
    document.body.addEventListener('click', function (e) {
      var btn = e.target.closest('.suspect-btn');
      if (btn) {
        openModal(btn.dataset.test, suspectIndex[btn.dataset.test]);
        return;
      }
      if (e.target === document.getElementById('modal-overlay') ||
          e.target.id === 'modal-close') {
        closeModal();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    // Initial render
    rerender();
  }

  // ── Entry ─────────────────────────────────────────────────────────────────

  if (typeof DASHBOARD_DATA === 'undefined' || !DASHBOARD_DATA) {
    document.body.innerHTML =
      '<p style="padding:40px;color:#ef4444">dashboard_data.js not loaded — '
      + 'open this file via a local server or place dashboard_data.js in the same directory.</p>';
  } else {
    boot(DASHBOARD_DATA);
  }
}());
</script>
</body>
</html>
