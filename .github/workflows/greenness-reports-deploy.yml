name: Deploy reports site to GitHub pages

on:
  push:
    branches:
      - 'main'
    paths:
      - 'reports/greenness_reports/**/*'
      - 'reports/dashboard/**/*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build pages artifact directory
        run: |
          mkdir -p .pages/dashboard

          # Preserve existing greenness URLs: /<year>/<report>.html
          cp -r reports/greenness_reports/. .pages/

          # Expose dashboard under /dashboard
          cp -r reports/dashboard/. .pages/dashboard/

      - name: Generate greenness directory index using tree
        run: |
          # Tree is installed by default on gh runners.
          cd .pages
          tree -H '.' \
            --noreport \
            --dirsfirst \
            -T "Buildfarm Greenness Reports" \
            -P "*.html" \
            -o index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.pages/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


